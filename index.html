<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Zoom: From Humans to Quarks</title>
  <meta name="description" content="Explore the scale of the universe. An interactive infinite zoom web component that takes you from the macroscopic human size all the way down to subatomic quarks.">
  
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #030303;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
    }

    /* Immersive Fullscreen Component Container */
    main {
      width: 100%;
      height: 100dvh;
      position: relative;
    }

    /* Visually hidden H1 for SEO correctness without cluttering the futuristic visual design */
    .seo-header {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }
  </style>
</head>
<body>
  <h1 class="seo-header">Quantum Zoom: An Interactive Journey from Humans to Quarks</h1>
  
  <main id="app-container">
    <!-- Our custom web component -->
    <infinite-zoom id="infinite-zoom-widget"></infinite-zoom>
  </main>

  <!-- Import web component -->
  <script type="module" src="infinite-zoom.js?v=8"></script>
</body>
</html>
